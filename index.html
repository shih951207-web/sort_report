<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>氣泡排序法演示</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f0f0f0;
        }
        h1 {
            color: #333;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .array {
            display: flex;
            justify-content: center;
            margin: 20px 0;
        }
        .element {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #4CAF50;
            color: white;
            margin: 0 5px;
            border-radius: 4px;
            transition: background-color 0.3s;
        }
        .element.swapping {
            background-color: #FF5722;
        }
        .element.sorted {
            background-color: #2196F3;
        }
        button {
            padding: 10px 20px;
            margin: 10px;
            background-color: #2196F3;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0b7dda;
        }
        .step-info {
            margin: 20px 0;
            font-weight: bold;
        }
        .explanation {
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>氣泡排序法 (Bubble Sort) 演示</h1>
        <div class="explanation">
            <h2>操作原理</h2>
            <p>氣泡排序法是一種簡單的排序演算法。它重複地走訪要排序的數列，一次比較兩個元素，如果他們的順序錯誤就把他們交換過來。走訪數列的工作是重複地進行直到沒有再需要交換，也就是說該數列已經排序完成。</p>
            <h2>操作過程的步驟</h2>
            <ol>
                <li>從數列的第一個元素開始，比較相鄰的元素。</li>
                <li>如果第一個比第二個大，就交換他們兩個。</li>
                <li>對每一對相鄰元素做同樣的工作，從開始第一對到結尾的最後一對。</li>
                <li>重複以上的步驟，直到整個數列排序完成。</li>
                <li>每次重複都會將最大的元素"冒泡"到數列的末尾。</li>
            </ol>
        </div>
        <div class="array" id="arrayContainer"></div>
        <div class="step-info" id="stepInfo">點擊"開始排序"來開始演示</div>
        <button onclick="startSort()">開始排序</button>
        <button onclick="resetArray()">重置數列</button>
    </div>

    <script>
        let array = [64, 34, 25, 12, 22, 11, 90];
        let currentStep = 0;
        let isSorting = false;
        let steps = [];

        function initializeArray() {
            const container = document.getElementById('arrayContainer');
            container.innerHTML = '';
            array.forEach(num => {
                const element = document.createElement('div');
                element.className = 'element';
                element.textContent = num;
                container.appendChild(element);
            });
        }

        function generateSteps() {
            steps = [];
            let arr = [...array];
            let n = arr.length;
            for (let i = 0; i < n - 1; i++) {
                for (let j = 0; j < n - i - 1; j++) {
                    steps.push({
                        type: 'compare',
                        indices: [j, j + 1],
                        array: [...arr]
                    });
                    if (arr[j] > arr[j + 1]) {
                        [arr[j], arr[j + 1]] = [arr[j + 1], arr[j]];
                        steps.push({
                            type: 'swap',
                            indices: [j, j + 1],
                            array: [...arr]
                        });
                    }
                }
                steps.push({
                    type: 'pass',
                    sortedIndex: n - i - 1,
                    array: [...arr]
                });
            }
            steps.push({
                type: 'done',
                array: [...arr]
            });
        }

        function startSort() {
            if (isSorting) return;
            isSorting = true;
            currentStep = 0;
            generateSteps();
            nextStep();
        }

        function nextStep() {
            if (currentStep >= steps.length) {
                isSorting = false;
                document.getElementById('stepInfo').textContent = '排序完成！';
                return;
            }

            const step = steps[currentStep];
            updateArray(step);
            updateInfo(step);
            currentStep++;

            setTimeout(nextStep, 1000); // 1秒後執行下一步
        }

        function updateArray(step) {
            const elements = document.querySelectorAll('.element');
            step.array.forEach((num, index) => {
                elements[index].textContent = num;
                elements[index].className = 'element';
            });

            if (step.type === 'compare' || step.type === 'swap') {
                step.indices.forEach(index => {
                    elements[index].classList.add('swapping');
                });
            }

            if (step.type === 'pass' || step.type === 'done') {
                for (let i = step.sortedIndex || step.array.length - 1; i < elements.length; i++) {
                    elements[i].classList.add('sorted');
                }
            }
        }

        function updateInfo(step) {
            const info = document.getElementById('stepInfo');
            switch (step.type) {
                case 'compare':
                    info.textContent = `比較元素 ${step.indices[0]} 和 ${step.indices[1]}`;
                    break;
                case 'swap':
                    info.textContent = `交換元素 ${step.indices[0]} 和 ${step.indices[1]}`;
                    break;
                case 'pass':
                    info.textContent = `第 ${step.sortedIndex + 1} 輪完成，最大的元素已排序`;
                    break;
                case 'done':
                    info.textContent = '排序完成！';
                    break;
            }
        }

        function resetArray() {
            isSorting = false;
            currentStep = 0;
            array = [64, 34, 25, 12, 22, 11, 90]; // 重置為初始數列
            initializeArray();
            document.getElementById('stepInfo').textContent = '點擊"開始排序"來開始演示';
        }

        // 初始化
        initializeArray();
    </script>
</body>
</html>
